name: "Nix flake check"

on:
  pull_request:
    branches:
      - '**'
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

jobs:
  flake:
    name: Standard flake test
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}

    permissions:
      contents: read
    env:
      NIXPKGS_ALLOW_UNFREE: 1

    steps:
      - name: checkout
        uses: actions/checkout@v4

      # NOTE: register aarch64 binfmt so the x86_64 runner can build aarch64
      # derivations under emulation. nix flake check evaluates every
      # nixosConfiguration (incl. the aarch64 selene), and that eval forces an
      # aarch64-only import-from-derivation (rust-overlay channel manifest).
      - name: set up QEMU (aarch64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: nix install
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            extra-platforms = aarch64-linux
        # NOTE: The check below will evalute standard portions of the flake, like nixosConfigurations, packages, devshells.
      - name: Standard flake check
        run: nix flake check

  homeManager:
    name: Home-Manager check
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}

    permissions:
      contents: read
    env:
      NIXPKGS_ALLOW_UNFREE: 1

    steps:
      - name: checkout
        uses: actions/checkout@v4

      # NOTE: aarch64 emulation, same as the flake job: the loop below evaluates
      # the aarch64 home configs (sysadmin-luna, sysadmin-eos), which pull the
      # rust-overlay channel manifest IFD that only builds on aarch64.
      - name: set up QEMU (aarch64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: nix install
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            extra-platforms = aarch64-linux
        # NOTE: Since home-manager flake ouput is custom, a manual check needs to be done for it.
      - name: Custom Home-manager flake check
        run: |
          # NOTE: This grabs all the users in the flake.
          # WARN: Since this does not depend on a flake.lock, this operation needs to be marked impure.
          # Since this only grabs a list of users, its inconsequential.
          USERS=$(nix eval --expr 'builtins.attrNames (builtins.getFlake "${builtins.toString ./.}").outputs.homeConfigurations' --impure)
          OIFS=$IFS
          USERS="${USERS:2:-2}"
          IFS=' ' read -r -a USERS <<< "$USERS"
          for USER in "${USERS[@]}"; do
            echo "HOME-MANAGER: CHECKING $USER"
            # NOTE: use this for now to evaluate, there might be a better way to do this in the future.
            # Also make sure to remove the quotes, as they were not removed earlier.
            # WARN: --impure so NIXPKGS_ALLOW_UNFREE is honored; the standalone homeConfigurations
            # receive nixpkgs.legacyPackages (no allowUnfree in config), so unfree pkgs need the env var.
            nix derivation show --impure ".#homeConfigurations.${USER:1:-1}.activationPackage"
          done
          IFS=$OIFS
